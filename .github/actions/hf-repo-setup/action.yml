name: 'HF Dataset Repo Setup'
description: >
  Cache-aware setup using GIT_LFS_SKIP_SMUDGE=1 so the clone is tiny
  (metadata only, no large LFS blobs).  The entire data/ dir fits in
  GitHub Actions cache.  After restore, the caller must selectively
  `git lfs pull --include="SYM/**"` the symbols it needs.
inputs:
  hf_token:        { required: true }
  repo_slug:       { required: true }
  data_dir:        { required: false, default: 'data' }
  mode:            { required: false, default: 'restore' }
  cache_prefix:    { required: false, default: '' }
  cache_suffix:    { required: false, default: '' }
outputs:
  cache_hit:
    value: ${{ steps.restore-cache.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    # ==================================================================
    # RESTORE — cache entire data/ (small because LFS blobs are skipped)
    # ==================================================================
    - name: Restore data cache
      if: inputs.mode == 'restore'
      id: restore-cache
      uses: actions/cache/restore@v4
      with:
        path: ${{ inputs.data_dir }}
        key: ${{ inputs.cache_prefix || inputs.repo_slug }}-data${{ inputs.cache_suffix }}
        restore-keys: |
          ${{ inputs.cache_prefix || inputs.repo_slug }}-data

    # ==================================================================
    # RESTORE — cache HIT: fast-forward sync (no LFS download)
    # ==================================================================
    - name: Sync from cache
      if: inputs.mode == 'restore' && steps.restore-cache.outputs.cache-hit == 'true'
      shell: bash
      run: |
        echo "::group::Cache hit — syncing (LFS skipped)"
        cd "${{ inputs.data_dir }}"
        git remote set-url origin \
          "https://hf_user:${{ inputs.hf_token }}@huggingface.co/datasets/${{ inputs.repo_slug }}" \
          2>/dev/null || git remote add origin \
          "https://hf_user:${{ inputs.hf_token }}@huggingface.co/datasets/${{ inputs.repo_slug }}"

        GIT_LFS_SKIP_SMUDGE=1 git fetch origin main --quiet
        git reset --hard "origin/main"
        echo "✅ Synced — HEAD=$(git rev-parse --short HEAD)"
        echo "::endgroup::"

    # ==================================================================
    # RESTORE — cache MISS: clone without LFS blobs
    # ==================================================================
    - name: Clone dataset
      if: inputs.mode == 'restore' && steps.restore-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        echo "::group::Cache miss — cloning (LFS skipped)"
        URL="https://hf_user:${{ inputs.hf_token }}@huggingface.co/datasets/${{ inputs.repo_slug }}"
        for attempt in 1 2 3; do
          echo "Clone attempt $attempt/3 …"
          if GIT_LFS_SKIP_SMUDGE=1 git clone "$URL" "${{ inputs.data_dir }}" 2>&1; then
            echo "✅ Clone OK — $(cd "${{ inputs.data_dir }}" && git rev-parse --short HEAD)"
            echo "::endgroup::"
            exit 0
          fi
          echo "Failed, waiting $((attempt * 30))s…"
          rm -rf "${{ inputs.data_dir }}"
          sleep $((attempt * 30))
        done
        echo "❌ Clone failed"
        exit 1

    # ==================================================================
    # SAVE — replace LFS blobs with pointers first, then cache
    # ==================================================================
    - name: Strip LFS blobs before cache
      if: inputs.mode == 'save'
      shell: bash
      run: |
        cd "${{ inputs.data_dir }}" 2>/dev/null || exit 0
        GIT_LFS_SKIP_SMUDGE=1 git checkout HEAD -- . 2>/dev/null || true
        rm -rf .git/lfs 2>/dev/null || true
        echo "LFS blobs stripped — cache will be metadata-only"

    - name: Save data cache
      if: inputs.mode == 'save'
      id: save-cache
      uses: actions/cache/save@v4
      with:
        path: ${{ inputs.data_dir }}
        key: ${{ inputs.cache_prefix || inputs.repo_slug }}-data${{ inputs.cache_suffix }}
