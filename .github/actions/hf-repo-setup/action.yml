name: 'HF Dataset Repo Setup'
description: >
  Cache-aware setup of a HuggingFace dataset repository clone.

  Two-layer cache:
    1. .git directory (compressed objects, critical path).
       Hit  → git fetch + reset --hard rebuilds working tree from local objects.
       Miss → full clone.

    2. Per-symbol data folders (bonus acceleration).
       Restored AFTER git operations so they survive git clean -fd.
       Hit  → data already on disk (skip checkout overhead).
       Miss → data was already checked out by git reset --hard above.

  Key rotation via cache_suffix (e.g. -0, -1, -2) prevents stale cache.

  Usage:
    - uses: ./.github/actions/hf-repo-setup           # restore
    - uses: ./.github/actions/hf-repo-setup           # save
      with: { mode: save, ... }
inputs:
  hf_token:        { required: true }
  repo_slug:       { required: true }
  data_dir:        { required: false, default: 'data' }
  mode:            { required: false, default: 'restore' }
  cache_prefix:    { required: false, default: '' }
  cache_suffix:    { required: false, default: '' }
outputs:
  git_cache_hit:
    value: ${{ steps.restore-git.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    # ==================================================================
    # RESTORE — Step 1: .git cache
    # ==================================================================
    - name: Restore .git cache
      if: inputs.mode == 'restore'
      id: restore-git
      uses: actions/cache/restore@v4
      with:
        path: ${{ inputs.data_dir }}/.git
        key: ${{ inputs.cache_prefix || inputs.repo_slug }}-git${{ inputs.cache_suffix }}
        restore-keys: |
          ${{ inputs.cache_prefix || inputs.repo_slug }}-git

    # ==================================================================
    # RESTORE — Step 2a: .git HIT → rebuild working tree
    # ==================================================================
    - name: Sync from .git cache
      if: inputs.mode == 'restore' && steps.restore-git.outputs.cache-hit == 'true'
      shell: bash
      run: |
        echo "::group::.git cache hit — syncing"
        cd "${{ inputs.data_dir }}"

        git remote set-url origin \
          "https://hf_user:${{ inputs.hf_token }}@huggingface.co/datasets/${{ inputs.repo_slug }}" \
          2>/dev/null || git remote add origin \
          "https://hf_user:${{ inputs.hf_token }}@huggingface.co/datasets/${{ inputs.repo_slug }}"

        # Rescue uncommitted data from a killed previous run.
        if [ -n "$(git status --porcelain 2>/dev/null)" ]; then
          echo "⚠ Rescuing uncommitted data"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A && git commit -m "rescue $(date -u +%Y-%m-%dT%H:%M:%SZ)" || true
          git push origin "$(git rev-parse --abbrev-ref HEAD)" 2>/dev/null || true
        fi

        git fetch origin main --quiet
        git reset --hard "origin/main"
        git clean -fd
        git lfs pull 2>/dev/null || true

        echo "✅ Synced — HEAD=$(git rev-parse --short HEAD)"
        echo "::endgroup::"

    # ==================================================================
    # RESTORE — Step 2b: .git MISS → full clone
    # ==================================================================
    - name: Clone dataset
      if: inputs.mode == 'restore' && steps.restore-git.outputs.cache-hit != 'true'
      shell: bash
      run: |
        echo "::group::.git cache miss — cloning"
        ok=0
        for strategy in "full" "shallow"; do
          for attempt in 1 2 3; do
            echo "Clone $strategy/$attempt …"
            [ "$strategy" = "shallow" ] && depth="--depth 1" || depth=""
            if git clone $depth "https://hf_user:${{ inputs.hf_token }}@huggingface.co/datasets/${{ inputs.repo_slug }}" "${{ inputs.data_dir }}" 2>&1; then
              cd "${{ inputs.data_dir }}" && git lfs pull 2>/dev/null || true
              echo "✅ Clone OK ($strategy) — $(cd "${{ inputs.data_dir }}" && git rev-parse --short HEAD)"
              echo "::endgroup::"
              exit 0
            fi
            echo "Failed ($strategy/$attempt), waiting $((attempt * 30))s…"
            rm -rf "${{ inputs.data_dir }}"
            sleep $((attempt * 30))
          done
        done
        echo "❌ Clone failed"
        exit 1

    # ==================================================================
    # RESTORE — Step 3: symbol data caches (AFTER git ops, purely additive)
    # ==================================================================
    - name: Restore symbol caches
      if: inputs.mode == 'restore'
      id: restore-symbols
      uses: actions/cache/restore@v4
      with:
        path: |
          ${{ inputs.data_dir }}/*/
        key: ${{ inputs.cache_prefix || inputs.repo_slug }}-data${{ inputs.cache_suffix }}
        restore-keys: |
          ${{ inputs.cache_prefix || inputs.repo_slug }}-data

    # ==================================================================
    # SAVE — .git
    # ==================================================================
    - name: Save .git cache
      if: inputs.mode == 'save'
      id: save-git
      uses: actions/cache/save@v4
      with:
        path: ${{ inputs.data_dir }}/.git
        key: ${{ inputs.cache_prefix || inputs.repo_slug }}-git${{ inputs.cache_suffix }}

    # ==================================================================
    # SAVE — per-symbol data folders
    # ==================================================================
    - name: Save symbol caches
      if: inputs.mode == 'save'
      id: save-symbols
      uses: actions/cache/save@v4
      with:
        path: |
          ${{ inputs.data_dir }}/*/
        key: ${{ inputs.cache_prefix || inputs.repo_slug }}-data${{ inputs.cache_suffix }}
