name: 'HF Dataset Repo Setup'
description: >
  Cache-aware setup of a HuggingFace dataset repository clone.

  Usage in workflow:
    - uses: ./.github/actions/hf-repo-setup   # restore (default mode)
    - uses: ./.github/actions/hf-repo-setup   # save
      with: { mode: save }
inputs:
  hf_token:
    required: true
  repo_slug:
    required: true
  data_dir:
    required: false
    default: 'data'
  mode:
    description: '"restore" (default) or "save"'
    required: false
    default: 'restore'
  cache_prefix:
    description: 'Override cache key prefix'
    required: false
    default: ''
outputs:
  git_cache_hit:
    description: 'Whether the .git cache was restored'
    value: ${{ steps.restore-git.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    # ==================================================================
    # RESTORE: .git cache
    # ==================================================================
    - name: Restore .git cache
      if: inputs.mode == 'restore'
      id: restore-git
      uses: actions/cache/restore@v4
      with:
        path: ${{ inputs.data_dir }}/.git
        key: ${{ inputs.cache_prefix || inputs.repo_slug }}-git
        restore-keys: |
          ${{ inputs.cache_prefix || inputs.repo_slug }}-git-

    # ==================================================================
    # RESTORE: per-symbol data folders
    # ==================================================================
    - name: Restore symbol caches
      if: inputs.mode == 'restore'
      id: restore-symbols
      uses: actions/cache/restore@v4
      with:
        path: |
          ${{ inputs.data_dir }}/*/
        key: ${{ inputs.cache_prefix || inputs.repo_slug }}-data
        restore-keys: |
          ${{ inputs.cache_prefix || inputs.repo_slug }}-data-

    # ==================================================================
    # RESTORE: .git cache HIT — rebuild working tree from local objects
    # ==================================================================
    - name: Sync from .git cache
      if: inputs.mode == 'restore' && steps.restore-git.outputs.cache-hit == 'true'
      shell: bash
      run: |
        echo "::group::.git cache hit — syncing from local objects"
        cd "${{ inputs.data_dir }}"
        git remote set-url origin \
          "https://hf_user:${{ inputs.hf_token }}@huggingface.co/datasets/${{ inputs.repo_slug }}" \
          2>/dev/null || git remote add origin \
          "https://hf_user:${{ inputs.hf_token }}@huggingface.co/datasets/${{ inputs.repo_slug }}"
        if [ -n "$(git status --porcelain 2>/dev/null)" ]; then
          echo "Rescuing uncommitted data from interrupted run"
          git config user.email "gh-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A && git commit -m "rescue $(date -u +%Y-%m-%dT%H:%M:%SZ)" || true
          git push origin main 2>/dev/null || true
        fi
        git fetch origin main --quiet
        git reset --hard "origin/main"
        git checkout HEAD -- .
        git clean -fd
        echo "✅ Synced — HEAD=$(git rev-parse --short HEAD)"
        echo "::endgroup::"

    # ==================================================================
    # RESTORE: .git cache MISS — full clone
    # ==================================================================
    - name: Clone dataset
      if: inputs.mode == 'restore' && steps.restore-git.outputs.cache-hit != 'true'
      shell: bash
      run: |
        echo "::group::.git cache miss — cloning"
        for strategy in "full" "shallow"; do
          for attempt in 1 2 3; do
            echo "Clone $strategy/$attempt …"
            if [ "$strategy" = "shallow" ]; then
              git clone --depth 1 "https://hf_user:${{ inputs.hf_token }}@huggingface.co/datasets/${{ inputs.repo_slug }}" "${{ inputs.data_dir }}" 2>&1 && ok=1 || ok=0
            else
              git clone "https://hf_user:${{ inputs.hf_token }}@huggingface.co/datasets/${{ inputs.repo_slug }}" "${{ inputs.data_dir }}" 2>&1 && ok=1 || ok=0
            fi
            if [ "$ok" = "1" ]; then
              echo "✅ Clone OK — $(cd "${{ inputs.data_dir }}" && git rev-parse --short HEAD)"
              echo "::endgroup::"
              exit 0
            fi
            echo "Failed, waiting $((attempt * 30))s…"
            rm -rf "${{ inputs.data_dir }}"
            sleep $((attempt * 30))
          done
        done
        echo "❌ Clone failed"
        exit 1

    # ==================================================================
    # SAVE: .git directory (critical)
    # ==================================================================
    - name: Save .git cache
      if: inputs.mode == 'save'
      uses: actions/cache/save@v4
      with:
        path: ${{ inputs.data_dir }}/.git
        key: ${{ inputs.cache_prefix || inputs.repo_slug }}-git

    # ==================================================================
    # SAVE: per-symbol data folders (bonus — fire and forget)
    # ==================================================================
    - name: Save symbol caches
      if: inputs.mode == 'save'
      uses: actions/cache/save@v4
      with:
        path: |
          ${{ inputs.data_dir }}/*/
        key: ${{ inputs.cache_prefix || inputs.repo_slug }}-data
