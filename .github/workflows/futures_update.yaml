name: Update USDT-M Perpetual Futures Dataset

on:
  # Offset a couple of hours from the spot job so they don't hit HF at once
  schedule:
    - cron: "0 2 * * 6"
  workflow_dispatch:
    inputs:
      batch_total:
        description: 'Total number of parallel batches (split work across N runs)'
        required: false
        default: '1'
        type: string
      batch_index:
        description: 'This run''s batch number (0-based, only processes jobs where job_index % batch_total == batch_index)'
        required: false
        default: '0'
        type: string
      fetch_workers:
        description: 'Number of parallel fetch workers (concurrent downloads)'
        required: false
        default: '64'
        type: string
      push_interval_sec:
        description: 'Seconds between auto-push checkpoints (shorter = less data loss on kill)'
        required: false
        default: '60'
        type: string
      max_runtime_min:
        description: 'Soft runtime budget in minutes (updater stops gracefully before the hard timeout)'
        required: false
        default: '300'
        type: string
      symbols:
        description: 'Comma-separated symbols to update (e.g. BTCUSDT,ETHUSDT). Leave empty for all.'
        required: false
        default: ''
        type: string
      rebuild_index:
        description: 'Rebuild _index.json from existing parquet files before running updater'
        required: false
        default: true
        type: boolean
      squash_history:
        description: 'Squash dataset repo history to a single commit (master batch only)'
        required: false
        default: true
        type: boolean
      force_full_fetch:
        description: 'Ignore _index.json, force full-history fetch for this batch/COINS'
        required: false
        default: false
        type: boolean

jobs:
  update-futures-dataset:
    runs-on: ubuntu-latest
    # Hard timeout: GH Actions max is 360 min; leave buffer for squash + save.
    timeout-minutes: 350

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        run: pip install poetry

      - name: Update Poetry lock file
        run: poetry lock

      - name: Install project dependencies
        run: poetry install

      # ------------------------------------------------------------------
      # Cache-aware HF repo setup (clone without LFS blobs)
      # ------------------------------------------------------------------
      - name: Setup dataset repository
        id: dataset-repo
        uses: ./.github/actions/hf-repo-setup
        with:
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_slug: linxy/USDT-M_Perpetual_Futures
          data_dir: data

      # ------------------------------------------------------------------
      # Selectively pull LFS files for this batch's symbols
      # ------------------------------------------------------------------
      - name: Pull LFS for batch symbols
        working-directory: data
        env:
          BATCH_TOTAL: ${{ inputs.batch_total || '1' }}
          BATCH_INDEX: ${{ inputs.batch_index || '0' }}
          COINS: ${{ inputs.symbols || '' }}
        run: |
          echo "::group::Resolving batch symbols"

          BATCH_PY="${GITHUB_WORKSPACE}/scripts/batch_symbols.py"
          if [ -n "${COINS:-}" ]; then
            SYMS=$(python3 "$BATCH_PY" --symbols "$COINS")
            echo "COINS filter: $(echo "$SYMS" | wc -l) symbol(s)"
          else
            SYMS=$(python3 "$BATCH_PY" --futures)
            echo "Batch: ${BATCH_INDEX}/${BATCH_TOTAL}  |  Symbols: $(echo "$SYMS" | wc -l)"
          fi
          BATCH_COUNT=$(echo "$SYMS" | grep -c . 2>/dev/null || echo 0)
          echo "This batch: ${BATCH_COUNT} symbol(s)"
          echo "::endgroup::"

          if [ "$BATCH_COUNT" -eq 0 ]; then
            echo "No symbols to pull — skipping"
            exit 0
          fi

          echo "$SYMS" | BATCH_COUNT="$BATCH_COUNT" bash "${GITHUB_WORKSPACE}/scripts/pull_lfs.sh" --stdin

      # ------------------------------------------------------------------
      # Rebuild _index.json from existing parquet files (fast — reads only time columns)
      # ------------------------------------------------------------------
      - name: Rebuild _index.json
        if: ${{ inputs.rebuild_index != false }}
        working-directory: data
        run: |
          echo "::group::Rebuilding _index.json from parquet files …"
          python3 -c "
          import os, json, time
          from pathlib import Path
          import pandas as pd

          TIME_COLS = {
              'klines': 'open_time', 'markPrice': 'open_time',
              'indexPrice': 'open_time', 'premiumIndex': 'open_time',
              'metrics': 'create_time', 'fundingRate': 'calc_time',
          }

          idx = {}
          total = errors = 0
          t0 = time.monotonic()
          for root, dirs, files in os.walk('.'):
              if '.git' in root.split(os.sep):
                  continue
              for f in files:
                  if not f.endswith('.parquet'):
                      continue
                  fp = os.path.join(root, f).lstrip('./')
                  total += 1
                  base = Path(f).stem
                  time_col = 'open_time'
                  for key in TIME_COLS:
                      if key in base:
                          time_col = TIME_COLS[key]; break
                  try:
                      df = pd.read_parquet(fp, columns=[time_col])
                  except Exception:
                      errors += 1; continue
                  if time_col not in df.columns:
                      continue
                  ts = pd.to_datetime(df[time_col], errors='coerce').max()
                  if pd.notna(ts):
                      idx[fp] = ts.strftime('%Y-%m-%d %H:%M:%S')

          with open('_index.json', 'w', encoding='utf-8') as out:
              json.dump(idx, out, indent=0, sort_keys=True, ensure_ascii=False)
          print(f'Index rebuilt: {len(idx)} entries ({total} files, {errors} errors) in {time.monotonic()-t0:.0f}s')
          " 2>&1
          echo "::endgroup::"

      # ------------------------------------------------------------------
      # Run the futures updater with periodic auto-push (checkpoints)
      # ------------------------------------------------------------------
      - name: Run the futures dataset update script with retries
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DATASET_SLUG: linxy/USDT-M_Perpetual_Futures
          DATA_DIR: data
          MAX_RUNTIME_MIN: ${{ inputs.max_runtime_min || '300' }}
          FETCH_WORKERS: ${{ inputs.fetch_workers || '64' }}
          PUSH_INTERVAL_SEC: ${{ inputs.push_interval_sec || '60' }}
          BATCH_TOTAL: ${{ inputs.batch_total || '1' }}
          BATCH_INDEX: ${{ inputs.batch_index || '0' }}
          PYTHONUNBUFFERED: "1"
          PROXY: ""
          FORCE_FULL_FETCH: ${{ inputs.force_full_fetch || 'false' }}
        run: |
          max_retries=5
          retry=0
          until bash scripts/run_futures_update.sh; do
            retry=$((retry + 1))
            if [ "$retry" -ge "$max_retries" ]; then
              echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] updater failed $retry times, giving up."
              exit 1
            fi
            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Update failed (attempt $retry/$max_retries), retrying in 30s..."
            sleep 30
          done

      # ------------------------------------------------------------------
      # Generate run summary (always, even on failure)
      # ------------------------------------------------------------------
      - name: Generate run summary
        if: always()
        env:
          PYTHONIOENCODING: utf-8:replace
        run: |
          if [ -f output/run_summary.json ]; then
            poetry run python -c "
          import json
          with open('output/run_summary.json') as f:
              s = json.load(f)
          with open('output/summary.md','w') as out:
           print(f'# USDT-M Perpetual Futures — Run Summary', file=out)
           print(f'| Item | Value |', file=out)
           print(f'|------|-------|', file=out)
           print(f'| Batch | {s.get(\"batch_index\",0)} / {s.get(\"batch_total\",1)} |', file=out)
           print(f'| Start | {s.get(\"start_time\",\"?\")} |', file=out)
           print(f'| End | {s.get(\"end_time\",\"?\")} |', file=out)
           print(f'| Elapsed | {s.get(\"elapsed_seconds\",\"?\")}s ({s.get(\"budget_limit_min\",\"?\")}min budget) |', file=out)
           print(f'| Series produced | {s.get(\"produced\",0)} |', file=out)
           print(f'| Series failed | {s.get(\"failed\",0)} |', file=out)
           print(f'| Symbols updated | {s.get(\"symbols_updated\",0)} |', file=out)
           print(f'| Remaining (next run) | {s.get(\"remaining\",0)} |', file=out)
           print('', file=out)
           if s.get('per_symbol'):
               print('### Updated symbols', file=out)
               print('| Symbol | Updated | Failed |', file=out)
               print('|--------|---------|--------|', file=out)
               for sym, info in sorted(s['per_symbol'].items()):
                   print(f'| {sym} | {info.get(\"updated\",0)} | {info.get(\"failed\",0)} |', file=out)
          " 2>&1
            cat output/summary.md >> $GITHUB_STEP_SUMMARY
          else
            echo "No run_summary.json found — updater may not have run." >> $GITHUB_STEP_SUMMARY
          fi

      # ------------------------------------------------------------------
      # Squash history — only the master batch squashes to avoid races
      # ------------------------------------------------------------------
      - name: Squash dataset repository history to a single commit
        if: always() && steps.dataset-repo.outcome == 'success' && inputs.squash_history != false
        working-directory: data
        env:
          BATCH_INDEX: ${{ inputs.batch_index || '0' }}
          BATCH_TOTAL: ${{ inputs.batch_total || '1' }}
        run: |
          set -e

          # Only the master batch (index 0) performs the squash.
          # Non-master batches skip — their data is already on remote
          # via auto-push during the run.
          if [ "${BATCH_INDEX:-0}" != "0" ] && [ "${BATCH_TOTAL:-1}" != "1" ]; then
            echo "Batch $BATCH_INDEX/$BATCH_TOTAL — skipping squash (master batch only)"
            exit 0
          fi

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Pull latest from remote to include all parallel runs' commits.
          export GIT_LFS_SKIP_SMUDGE=1
          for attempt in 1 2 3; do
            if git fetch origin main --quiet 2>&1; then break; fi
            echo "Fetch attempt $attempt/3 failed, retrying in $((attempt * 10))s…"
            sleep $((attempt * 10))
          done
          git reset --hard "origin/main"

          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          BEFORE_SHA=$(git rev-parse HEAD)

          # If only one commit (or orphan root), skip squash.
          ROOT_SHA=$(git rev-list --max-parents=0 HEAD 2>/dev/null || echo "")
          COMMIT_COUNT=$(git rev-list --count "$ROOT_SHA..HEAD" 2>/dev/null || echo "1")
          if [ "${COMMIT_COUNT:-1}" -le 1 ]; then
            echo "Single commit — squash not needed (HEAD=$BEFORE_SHA)"
            exit 0
          fi

          git checkout --orphan squash-tmp
          git add -A
          git commit -m "Squash history — was ${BEFORE_SHA}, $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git branch -D "$BRANCH"
          git branch -m "$BRANCH"
          git push origin "$BRANCH" --force-with-lease="$BRANCH:$BEFORE_SHA"

          # Clean up unreachable objects so .git stays small for caching
          git reflog expire --expire=now --all 2>/dev/null || true
          git gc --prune=now --aggressive 2>/dev/null || true
          echo "Post-squash .git size: $(du -sh .git | cut -f1)"

      # ------------------------------------------------------------------
      # Save the cache for the next run
      # ------------------------------------------------------------------
      - name: Save dataset caches
        if: always() && steps.dataset-repo.outcome == 'success'
        uses: ./.github/actions/hf-repo-setup
        with:
          mode: save
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_slug: linxy/USDT-M_Perpetual_Futures
          data_dir: data
