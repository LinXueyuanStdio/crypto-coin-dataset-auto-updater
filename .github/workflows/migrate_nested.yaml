name: Migrate to Nested Per-Symbol Structure

on:
  workflow_dispatch:
    inputs:
      dataset_slug:
        description: 'HF dataset slug to migrate'
        required: true
        default: 'linxy/USDT-M_Perpetual_Futures'
        type: string

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ------------------------------------------------------------------
      # Cache-aware clone using .git cache (saves ~8 min on retries)
      # ------------------------------------------------------------------
      - name: Setup dataset repo
        id: dataset-repo
        uses: ./.github/actions/hf-repo-setup
        with:
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_slug: ${{ inputs.dataset_slug }}
          data_dir: data

      - name: Install dependencies for migration
        run: pip install pandas pyarrow huggingface_hub

      - name: Migrate symbols one-by-one (resumable)
        working-directory: data
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e
          git config user.email "migration-bot[bot]@users.noreply.github.com"
          git config user.name "migration-bot[bot]"

          python3 -c "
          import os, sys, json
          from collections import defaultdict
          import pandas as pd
          from huggingface_hub import HfApi, CommitOperationAdd, CommitOperationDelete

          api = HfApi(token=os.environ['HF_TOKEN'])
          repo = 'linxy/USDT-M_Perpetual_Futures'

          # ---- find symbols that still need migration ----
          files = api.list_repo_files(repo, repo_type='dataset')
          flat_csvs = [f for f in files if f.endswith('.csv') and '/' not in f]
          by_symbol = defaultdict(list)
          for f in flat_csvs:
              symbol = f.split('_')[0]
              by_symbol[symbol].append(f)

          if not by_symbol:
              print('All symbols already migrated — nothing to do')
              sys.exit(0)

          symbols = sorted(by_symbol)
          print(f'{len(symbols)} symbol(s) to migrate: {symbols}')

          # ---- process each symbol ----
          for sym in symbols:
              csvs = by_symbol[sym]
              print(f'\n>>> {sym} ({len(csvs)} files)')

              # Reorganize: move CSV files into {sym}/ folder
              os.makedirs(sym, exist_ok=True)
              for csv in csvs:
                  if os.path.exists(csv):
                      os.rename(csv, os.path.join(sym, csv))

              # Convert CSV → Parquet, delete CSV
              for csv in csvs:
                  csv_path = os.path.join(sym, csv)
                  if not os.path.exists(csv_path):
                      continue
                  pq_path = csv_path[:-4] + '.parquet'
                  df = pd.read_csv(csv_path, dtype=str)
                  df.to_parquet(pq_path, index=False, compression='zstd')
                  os.remove(csv_path)

              # Build commit: delete old flat CSVs + add new parquets
              ops = []
              for csv in csvs:
                  ops.append(CommitOperationDelete(path_in_repo=csv))
              for f in sorted(os.listdir(sym)):
                  fp = os.path.join(sym, f)
                  ops.append(CommitOperationAdd(path_in_repo=fp, path_or_fileobj=fp))

              print(f'  Committing {len(ops)} operations …')
              try:
                  api.create_commit(
                      repo_id=repo,
                      repo_type='dataset',
                      commit_message=f'migrate: {sym} → {sym}/',
                      operations=ops,
                  )
              except Exception as e:
                  print(f'  ERROR committing {sym}: {e}')
                  # Rollback local changes for retry
                  if os.path.isdir(sym):
                      for f in os.listdir(sym):
                          fp = os.path.join(sym, f)
                          if os.path.isfile(fp):
                              os.rename(fp, f) if not os.path.exists(f) else None
                      os.rmdir(sym) if not os.listdir(sym) else None
                  raise

              # Sync local git with remote (so .git cache is fresh)
              os.system('git fetch origin main --quiet')
              os.system('git reset --hard origin/main')
              print(f'  ✅ {sym} done')

          print(f'\n=== {len(symbols)} symbols migrated ===')

          # ---- final: update _index.json ----
          if os.path.exists('_index.json'):
              with open('_index.json') as f:
                  idx = json.load(f)
              new_idx = {}
              for old_key, ts in idx.items():
                  symbol = old_key.split('_')[0]
                  name = old_key.replace('.csv', '.parquet')
                  new_key = f'{symbol}/{name}'
                  new_idx[new_key] = ts
              with open('_index.json', 'w') as f:
                  json.dump(new_idx, f, indent=0, sort_keys=True)
              print(f'Updated {len(new_idx)} _index.json entries')
          " 2>&1
          echo "=== Migration complete ==="

      # ------------------------------------------------------------------
      # Save caches so retries skip the clone
      # ------------------------------------------------------------------
      - name: Save caches
        if: always() && steps.dataset-repo.outcome == 'success'
        uses: ./.github/actions/hf-repo-setup
        with:
          mode: save
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_slug: ${{ inputs.dataset_slug }}
          data_dir: data
