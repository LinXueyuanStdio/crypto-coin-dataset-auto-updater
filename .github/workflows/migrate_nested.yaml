name: Migrate to Nested Per-Symbol Structure

on:
  workflow_dispatch:
    inputs:
      dataset_slug:
        description: 'HF dataset slug to migrate'
        required: true
        default: 'linxy/USDT-M_Perpetual_Futures'
        type: string

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Clone dataset repository
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          for attempt in 1 2 3; do
            echo "Clone attempt $attempt/3 …"
            if git clone --depth 1 \
              "https://hf_user:${HF_TOKEN}@huggingface.co/datasets/${{ inputs.dataset_slug }}" \
              data 2>&1; then
              echo "✅ Clone OK"
              break
            fi
            echo "Clone failed, waiting $((attempt * 30))s…"
            rm -rf data
            sleep $((attempt * 30))
          done
          [ -d data ] || { echo "❌ Clone failed"; exit 1; }

      - name: Install dependencies for migration
        run: pip install pandas pyarrow

      - name: Reorganize + convert to Parquet
        working-directory: data
        env:
          DATASET_SLUG: ${{ inputs.dataset_slug }}
        run: |
          set -e
          git config user.email "migration-bot[bot]@users.noreply.github.com"
          git config user.name "migration-bot[bot]"

          echo "=== Step 1: Reorganize CSV files into per-symbol folders ==="
          moved=0
          for csv in *.csv; do
            [ -f "$csv" ] || continue
            case "$csv" in
              .*|README.md|meta.json|.gitattributes|.gitignore) continue ;;
            esac
            symbol="${csv%%_*}"
            mkdir -p "$symbol"
            git mv "$csv" "$symbol/$csv" || mv "$csv" "$symbol/$csv"
            moved=$((moved + 1))
          done
          echo "Moved $moved CSV files into per-symbol folders"

          echo "=== Step 2: Convert CSVs to Parquet and delete CSVs ==="
          python3 -c "
          import os, sys, pandas as pd
          total = sum(1 for _, _, fs in os.walk('.') for f in fs if f.endswith('.csv'))
          done = 0
          for root, dirs, files in os.walk('.'):
              for f in files:
                  if not f.endswith('.csv'):
                      continue
                  csv_path = os.path.join(root, f)
                  pq_path = csv_path[:-4] + '.parquet'
                  df = pd.read_csv(csv_path, dtype=str)
                  df.to_parquet(pq_path, index=False, compression='zstd')
                  os.remove(csv_path)
                  done += 1
                  if done % 50 == 0 or done == total:
                      print(f'  [{done}/{total}] converted', flush=True)
          print(f'Completed: {done}/{total} files')
          " 2>&1

          echo "=== Step 3: Update _index.json keys ==="
          if [ -f _index.json ]; then
            python3 -c "
          import json
          with open('_index.json') as f:
              idx = json.load(f)
          new_idx = {}
          for old_key, ts in idx.items():
              symbol = old_key.split('_')[0]
              # Add folder prefix + change extension
              name = old_key.replace('.csv', '.parquet')
              new_key = f'{symbol}/{name}'
              new_idx[new_key] = ts
          with open('_index.json', 'w') as f:
              json.dump(new_idx, f, indent=0, sort_keys=True)
          print(f'Updated {len(new_idx)} index entries')
          " || echo "(no _index.json — will be built from parquet files)"
          fi

          echo "=== Step 4: Upload via huggingface_hub create_commit ==="
          # Use create_commit to batch all file operations into ONE API call,
          # avoiding the per-file LFS rate limit that `git push` triggers.
          python3 -c "
          import os, sys
          from huggingface_hub import HfApi, CommitOperationAdd, CommitOperationDelete

          api = HfApi(token=os.environ['HF_TOKEN'])
          repo = 'linxy/USDT-M_Perpetual_Futures'
          ops = []

          # (a) Delete old flat CSV files from repo root
          try:
              files = api.list_repo_files(repo, repo_type='dataset')
              old_csvs = [f for f in files if f.endswith('.csv') and '/' not in f]
              print(f'Deleting {len(old_csvs)} old flat CSV files …')
              for f in old_csvs:
                  ops.append(CommitOperationDelete(path_in_repo=f))
          except Exception as e:
              print(f'Could not list remote files: {e}')

          # (b) Add new Parquet files and metadata
          for root, dirs, files in os.walk('.'):
              # skip .git
              if '.git' in root.split(os.sep):
                  continue
              for f in files:
                  if f in ('.git', '.gitignore', '.gitattributes'):
                      continue
                  path = os.path.join(root, f).lstrip('./')
                  ops.append(CommitOperationAdd(path_in_repo=path, path_or_fileobj=path))

          print(f'Creating commit with {len(ops)} operations …')
          api.create_commit(
              repo_id=repo,
              repo_type='dataset',
              commit_message='migrate: per-symbol folders + Parquet format',
              commit_description='Reorganised into {symbol}/{symbol}_suffix.parquet layout; CSV converted to Parquet (zstd)',
              operations=ops,
          )
          print(f'Commit created — {len(ops)} operations')
          " 2>&1
          echo "=== Migration complete ==="
