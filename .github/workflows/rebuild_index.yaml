name: Rebuild _index.json + Validate Data Completeness

on:
  workflow_dispatch:
    inputs:
      dataset_slug:
        description: 'HF dataset slug'
        required: false
        default: 'linxy/USDT-M_Perpetual_Futures'
      min_span_days:
        description: 'Flag files spanning fewer than N days. -1 = use exact listing date (flag if starts ≥1yr after listing). 0 = skip check.'
        required: false
        default: '30'
      delete_incomplete:
        description: 'Delete incomplete parquet files + index entries to trigger re-fetch?'
        required: false
        default: 'false'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pandas pyarrow huggingface_hub

      # ------------------------------------------------------------------
      # Full clone — needs actual parquet data, not LFS pointers
      # ------------------------------------------------------------------
      - name: Clone dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e
          URL="https://hf_user:${HF_TOKEN}@huggingface.co/datasets/${{ inputs.dataset_slug }}"
          git clone "$URL" data
          cd data
          git config user.email "actions[bot]@users.noreply.github.com"
          git config user.name "actions[bot]"

      # ------------------------------------------------------------------
      # 1. Rebuild _index.json from actual Parquet files
      # ------------------------------------------------------------------
      - name: Rebuild _index.json
        working-directory: data
        run: |
          python3 -c "
          import os, json, time
          from pathlib import Path
          import pandas as pd

          TIME_COLS = {
              'klines': 'open_time',
              'markPrice': 'open_time',
              'indexPrice': 'open_time',
              'premiumIndex': 'open_time',
              'metrics': 'create_time',
              'fundingRate': 'calc_time',
          }

          idx = {}
          total = 0
          errors = 0
          t0 = time.monotonic()
          for root, dirs, files in os.walk('.'):
              if '.git' in root.split(os.sep):
                  continue
              for f in files:
                  if not f.endswith('.parquet'):
                      continue
                  fp = os.path.join(root, f).lstrip('./')
                  total += 1
                  try:
                      df = pd.read_parquet(fp)
                  except Exception as e:
                      errors += 1
                      if errors <= 10:
                          print(f'  SKIP {fp}: {e}')
                      continue

                  base = Path(f).stem
                  if 'markPrice' in base:
                      time_col = 'open_time'
                  elif 'indexPrice' in base:
                      time_col = 'open_time'
                  elif 'premiumIndex' in base:
                      time_col = 'open_time'
                  elif 'metrics' in base:
                      time_col = 'create_time'
                  elif 'fundingRate' in base:
                      time_col = 'calc_time'
                  else:
                      time_col = 'open_time'

                  if time_col not in df.columns:
                      print(f'  SKIP {fp}: no column {time_col}')
                      continue

                  ts = pd.to_datetime(df[time_col], errors='coerce')
                  ts_max = ts.max()
                  if pd.notna(ts_max):
                      idx[fp] = ts_max.strftime('%Y-%m-%d %H:%M:%S')
                  if total % 500 == 0:
                      print(f'  [{total}] scanned …', flush=True)

          with open('_index.json', 'w', encoding='utf-8') as out:
              json.dump(idx, out, indent=0, sort_keys=True, ensure_ascii=False)
          print(f'Index rebuild done: {len(idx)}/{total} files ({errors} errors) in {time.monotonic()-t0:.0f}s')
          " 2>&1

      # ------------------------------------------------------------------
      # 2. Validate data completeness
      # ------------------------------------------------------------------
      - name: Validate data completeness
        working-directory: data
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MIN_SPAN_DAYS: ${{ inputs.min_span_days || '30' }}
          DELETE_INCOMPLETE: ${{ inputs.delete_incomplete || 'false' }}
          PYTHONUNBUFFERED: "1"
        run: |
          MIN_SPAN_DAYS="${MIN_SPAN_DAYS:-30}"
          DELETE_INCOMPLETE="${DELETE_INCOMPLETE:-false}"

          mkdir -p ../output
          echo "::group::Completeness check (min_span=${MIN_SPAN_DAYS}d)"
          echo ""

          python3 -c "
          import os, json, sys
          from pathlib import Path
          import pandas as pd

          MIN_SPAN = int(os.environ.get('MIN_SPAN_DAYS', '30'))
          DELETE = os.environ.get('DELETE_INCOMPLETE', 'false').lower() == 'true'

          if MIN_SPAN == 0:
              print('MIN_SPAN_DAYS=0 — skipping completeness check')
              sys.exit(0)

          USE_LISTING_DATE = (MIN_SPAN == -1)

          TIME_COLS = {
              'klines': 'open_time', 'markPrice': 'open_time',
              'indexPrice': 'open_time', 'premiumIndex': 'open_time',
              'metrics': 'create_time', 'fundingRate': 'calc_time',
          }
          DEFAULT_FLOORS = {
              'klines': '2020-01', 'markPrice': '2020-01',
              'indexPrice': '2020-01', 'premiumIndex': '2020-01',
              'metrics': '2021-01', 'fundingRate': '2020-01',
          }

          # Load per-symbol listing dates from meta.json
          listing_dates = {}
          if os.path.exists('meta.json'):
              with open('meta.json') as f:
                  meta = json.load(f)
              for sym, info in meta.items():
                  ld = info.get('listing_date')
                  if ld:
                      listing_dates[sym] = ld

          suspicious = []
          corrupted = []
          ok = 0
          skipped = 0
          total = 0

          for root, dirs, files in os.walk('.'):
              if '.git' in root.split(os.sep):
                  continue
              for f in sorted(files):
                  if not f.endswith('.parquet'):
                      continue
                  fp = os.path.join(root, f).lstrip('./')
                  total += 1

                  base = Path(f).stem
                  # Extract symbol from path: e.g. "BTCUSDT/BTCUSDT_1d.parquet" -> "BTCUSDT"
                  symbol = fp.split('/')[0] if '/' in fp else fp.split('_')[0]

                  if 'markPrice' in base:
                      dt_key = 'markPrice'
                  elif 'indexPrice' in base:
                      dt_key = 'indexPrice'
                  elif 'premiumIndex' in base:
                      dt_key = 'premiumIndex'
                  elif 'metrics' in base:
                      dt_key = 'metrics'
                  elif 'fundingRate' in base:
                      dt_key = 'fundingRate'
                  else:
                      dt_key = 'klines'

                  time_col = TIME_COLS[dt_key]
                  # Use per-symbol listing date if available, otherwise generic floor
                  floor = listing_dates.get(symbol, DEFAULT_FLOORS[dt_key])

                  try:
                      df = pd.read_parquet(fp, columns=[time_col])
                  except Exception as e:
                      corrupted.append((fp, dt_key, floor, str(e)))
                      continue

                  if df.empty or time_col not in df.columns:
                      skipped += 1
                      continue

                  ts = pd.to_datetime(df[time_col], errors='coerce')
                  earliest = ts.min()
                  latest = ts.max()

                  if pd.isna(earliest) or pd.isna(latest):
                      skipped += 1
                      continue

                  span_days = (latest - earliest).days

                  if USE_LISTING_DATE:
                      # -1 mode: compare earliest timestamp against exact listing date
                      floor_dt = pd.Timestamp(floor + '-01')
                      if earliest >= floor_dt + pd.DateOffset(years=1):
                          suspicious.append((fp, dt_key, floor, earliest, latest, span_days, 'starts ≥1yr after listing'))
                      else:
                          ok += 1
                  elif span_days < MIN_SPAN:
                      floor_dt = pd.Timestamp(floor + '-01')
                      if earliest >= floor_dt + pd.DateOffset(years=1):
                          suspicious.append((fp, dt_key, floor, earliest, latest, span_days, ''))
                      else:
                          ok += 1
                  else:
                      ok += 1

                  if total % 500 == 0:
                      print(f'  [{total}] checked … (ok={ok}, incomplete={len(suspicious)}, corrupted={len(corrupted)}, skipped={skipped})', flush=True)

          # ---- report ----
          all_bad = suspicious + corrupted
          print(f'Total files checked: {total}')
          if USE_LISTING_DATE:
              print(f'Mode: listing-date (flag if starts ≥1yr after listing)')
              print(f'OK (starts within 1yr of listing): {ok}')
              print(f'Incomplete (starts ≥1yr after listing): {len(suspicious)}')
          else:
              print(f'OK (span >= {MIN_SPAN}d or pre-floor): {ok}')
              print(f'Incomplete (span < {MIN_SPAN}d): {len(suspicious)}')
          print(f'Corrupted (unreadable/empty): {len(corrupted)}')
          if skipped:
              print(f'Skipped (no timestamp data): {skipped}')
          print('')

          if all_bad:
              os.makedirs('../output', exist_ok=True)
              with open('../output/completeness_report.md', 'w') as out:
               print('# Data Completeness Report', file=out)
               print('', file=out)
               if USE_LISTING_DATE:
                   print(f'Mode: **listing-date** (flag if earliest ≥ 1 year after listing)', file=out)
               else:
                   print(f'Min span threshold: **{MIN_SPAN} days**', file=out)
               print(f'Incomplete files: **{len(suspicious)}**', file=out)
               print(f'Corrupted files: **{len(corrupted)}**', file=out)
               print('', file=out)
               if suspicious:
                   print('## Incomplete (span < threshold)', file=out)
                   print('', file=out)
                   print('| File | Type | Floor | Earliest | Latest | Span |', file=out)
                   print('|------|------|-------|----------|--------|------|', file=out)
                   for row in sorted(suspicious):
                       fp, dt_key, floor, earliest, latest, span_days = row[:6]
                       print(f'| {fp} | {dt_key} | {floor} | {earliest.date()} | {latest.date()} | {span_days}d |', file=out)
               if corrupted:
                   print('', file=out)
                   print('## Corrupted (unreadable / empty)', file=out)
                   print('', file=out)
                   print('| File | Type | Floor | Error |', file=out)
                   print('|------|------|-------|-------|', file=out)
                   for row in sorted(corrupted):
                       fp, dt_key, floor, err = row
                       print(f'| {fp} | {dt_key} | {floor} | {err[:120]} |', file=out)
              print(f'Completeness report saved (repo root: output/completeness_report.md)')
          else:
              print('✅ All files pass completeness check')
              os.makedirs('../output', exist_ok=True)
              with open('../output/completeness_report.md', 'w') as out:
                  print('# Data Completeness Report', file=out)
                  print(f'✅ All {total} files pass the {MIN_SPAN}-day span check.', file=out)

          # ---- optionally delete bad files ----
          delete_list = suspicious + corrupted
          if DELETE and delete_list:
              from huggingface_hub import HfApi, CommitOperationDelete
              api = HfApi(token=os.environ['HF_TOKEN'])
              ops = []
              for row in suspicious:
                  ops.append(CommitOperationDelete(path_in_repo=row[0]))
                  print(f'  WILL DELETE {row[0]} (span={row[5]}d, earliest={row[3].date()})')
              for row in corrupted:
                  ops.append(CommitOperationDelete(path_in_repo=row[0]))
                  print(f'  WILL DELETE {row[0]} (corrupted: {row[3][:80]})')
              if ops:
                  api.create_commit(
                      repo_id='${{ inputs.dataset_slug }}',
                      repo_type='dataset',
                      commit_message=f'fix: delete {len(ops)} bad parquet files ({len(suspicious)} incomplete, {len(corrupted)} corrupted)',
                      operations=ops,
                  )
                  # Only remove local files after remote commit succeeds
                  for row in suspicious:
                      os.remove(row[0]) if os.path.exists(row[0]) else None
                  for row in corrupted:
                      os.remove(row[0]) if os.path.exists(row[0]) else None
                  print(f'{len(ops)} files deleted (remote + local) — next updater run will re-fetch from scratch')
          elif DELETE and not delete_list:
              print('No files to delete')

          # ---- rebuild _index.json after deletion ----
          if DELETE and delete_list:
              print('Rebuilding _index.json after deletion …')
              with open('_index.json') as f:
                  idx = json.load(f)
              removed = [fp for fp, *_ in ([fp for fp, *_ in suspicious] + [fp for fp, *_ in corrupted]) if fp in idx]
              for fp in removed:
                  del idx[fp]
              with open('_index.json', 'w', encoding='utf-8') as f:
                  json.dump(idx, f, indent=0, sort_keys=True, ensure_ascii=False)
              print(f'Removed {len(removed)} entries from _index.json')
          " 2>&1

          echo ""
          echo "::endgroup::"

          INCOMPLETE_COUNT=$(python3 -c "
          import os, re
          if os.path.exists('../output/completeness_report.md'):
              with open('../output/completeness_report.md') as f:
                  text = f.read()
              m1 = re.search(r'Incomplete files: \*\*(\d+)\*\*', text)
              m2 = re.search(r'Corrupted files: \*\*(\d+)\*\*', text)
              total = (int(m1.group(1)) if m1 else 0) + (int(m2.group(1)) if m2 else 0)
              print(total)
          else:
              print(0)
          ")
          if [ "$INCOMPLETE_COUNT" -gt 0 ] && [ "$DELETE_INCOMPLETE" != "true" ]; then
              echo ""
              echo "⚠️  ${INCOMPLETE_COUNT} incomplete file(s) found!"
              echo "   Re-run with delete_incomplete=true to remove them and trigger re-fetch."
              echo ""
          fi
          echo "Completeness check done ($INCOMPLETE_COUNT incomplete)"

      # ------------------------------------------------------------------
      # 3. Upload _index.json
      # ------------------------------------------------------------------
      - name: Upload _index.json
        working-directory: data
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -c "
          from huggingface_hub import HfApi, CommitOperationAdd
          import os
          api = HfApi(token=os.environ['HF_TOKEN'])
          repo = '${{ inputs.dataset_slug }}'
          api.create_commit(
              repo_id=repo,
              repo_type='dataset',
              commit_message='fix: rebuild _index.json from Parquet files',
              operations=[CommitOperationAdd(path_in_repo='_index.json', path_or_fileobj='_index.json')],
          )
          print('_index.json uploaded')
          "

      # ------------------------------------------------------------------
      # 4. Show report
      # ------------------------------------------------------------------
      - name: Show completeness report
        if: always()
        run: |
          if [ -f output/completeness_report.md ]; then
            cat output/completeness_report.md >> $GITHUB_STEP_SUMMARY
          fi
