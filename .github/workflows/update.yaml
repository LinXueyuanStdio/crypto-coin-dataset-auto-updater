name: Update Dataset

on:
  # Run every day at midnight (UTC) — adjust the schedule as needed
  schedule:
    - cron: "0 0 * * *"
  # Allows manual triggering via the "Actions" tab
  workflow_dispatch:

jobs:
  update-dataset:
    runs-on: ubuntu-latest
    # GitHub Actions defaults to a 360-minute (6h) job timeout, after which the
    # job is silently cancelled. Set an explicit timeout so that a stuck run
    # (e.g. Binance API blocked via the proxy) fails clearly and quickly
    # instead of running for hours with no useful signal.
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10" # Or your required version

      - name: Install Poetry
        run: pip install poetry

      - name: Update Poetry lock file
        run: poetry lock

      - name: Install project dependencies
        run: poetry install

      - name: Clone the dataset repository
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git clone https://hf_user:${HF_TOKEN}@huggingface.co/datasets/linxy/CryptoCoin data

      - name: Setup Proxy
        run: |
          echo "Setting up proxy configuration..."
          sudo apt-get update
          sudo apt-get install -y tor privoxy
          sudo bash -c 'cat >> /etc/privoxy/config << EOL
          forward-socks5 / 127.0.0.1:9050 .
          max-client-connections 256
          keep-alive-timeout 5
          socket-timeout 300
          EOL'
          sudo service tor start
          sudo service privoxy start
          curl --proxy http://127.0.0.1:8118 https://api.ipify.org || true
          sleep 15  # Allow services to stabilize

      - name: Run the dataset update script with retries
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          HTTP_PROXY: "http://127.0.0.1:8118"
          HTTPS_PROXY: "http://127.0.0.1:8118"
          # Ensure Python logs are flushed immediately instead of being
          # buffered, so timestamps in the Actions log reflect reality.
          PYTHONUNBUFFERED: "1"
        run: |
          max_retries=5
          retry=0
          until poetry run python updater.py; do
            retry=$((retry + 1))
            if [ "$retry" -ge "$max_retries" ]; then
              echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] updater.py failed $retry times, giving up."
              exit 1
            fi
            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Dataset update failed (attempt $retry/$max_retries), retrying in 30 seconds..."
            sleep 30
          done