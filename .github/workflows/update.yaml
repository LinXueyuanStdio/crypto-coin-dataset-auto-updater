name: Update CryptoCoin Dataset

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      batch_total:
        description: 'Total number of parallel batches'
        required: false
        default: '1'
        type: string
      batch_index:
        description: 'This run''s batch number (0-based)'
        required: false
        default: '0'
        type: string
      fetch_workers:
        description: 'Number of parallel fetch workers'
        required: false
        default: '16'
        type: string
      push_interval_sec:
        description: 'Seconds between auto-push checkpoints'
        required: false
        default: '60'
        type: string
      max_runtime_min:
        description: 'Soft runtime budget in minutes'
        required: false
        default: '100'
        type: string

jobs:
  update-cryptocoin-dataset:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        run: pip install poetry

      - name: Update Poetry lock file
        run: poetry lock

      - name: Install project dependencies
        run: poetry install

      # ------------------------------------------------------------------
      # Cache-aware HF repo setup (clone without LFS blobs)
      # ------------------------------------------------------------------
      - name: Setup dataset repository
        id: dataset-repo
        uses: ./.github/actions/hf-repo-setup
        with:
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_slug: linxy/CryptoCoin
          data_dir: data

      # ------------------------------------------------------------------
      # Selectively pull LFS files for this batch's symbols
      # Spot symbols are resolved from Binance spot API (not futures symbols.json)
      # ------------------------------------------------------------------
      - name: Pull LFS for batch symbols
        working-directory: data
        env:
          BATCH_TOTAL: ${{ inputs.batch_total || '1' }}
          BATCH_INDEX: ${{ inputs.batch_index || '0' }}
        run: |
          echo "::group::Resolving spot symbols"
          SYMS=$(python3 -c "
          import os, json, sys
          FALLBACK = sorted({
              '1INCHUSDT','AAVEUSDT','ADAUSDT','ALGOUSDT','AVAXUSDT',
              'BATUSDT','BCHUSDT','BNBUSDT','BTCUSDT','CHZUSDT',
              'COMPUSDT','CRVUSDT','DOGEUSDT','DOTUSDT','EOSUSDT',
              'ETCUSDT','ETHUSDT','FILUSDT','FTMUSDT','HBARUSDT',
              'ICPUSDT','KSMUSDT','LDOUSDT','LINKUSDT','LTCUSDT',
              'MANAUSDT','MATICUSDT','RUNEUSDT','SANDUSDT','SHIBUSDT',
              'SNXUSDT','SOLUSDT','SUSHIUSDT','TRXUSDT','UNIUSDT',
              'WAVESUSDT','XEMUSDT','XLMUSDT','XRPUSDT','YFIUSDT',
              'ZILUSDT','ZRXUSDT',
          })
          syms = []
          try:
              import requests
              for url in [
                  'https://api.binance.com/api/v3/exchangeInfo',
                  'https://api-gcp.binance.com/api/v3/exchangeInfo',
              ]:
                  resp = requests.get(url, timeout=10)
                  resp.raise_for_status()
                  data = resp.json()
                  syms = sorted(
                      s['symbol'].encode('utf-8', errors='surrogatepass').decode('utf-8', errors='replace')
                      for s in data.get('symbols', [])
                      if s.get('quoteAsset') == 'USDT'
                      and s.get('status') == 'TRADING'
                      and 'SPOT' in (s.get('permissions') or [])
                  )
                  if syms:
                      sys.stderr.write(f'# spot API: {len(syms)} symbols\n')
                      break
          except Exception as e:
              sys.stderr.write(f'# spot API failed: {e}\n')
          if not syms:
              syms = list(FALLBACK)
              sys.stderr.write(f'# using fallback: {len(syms)} symbols\n')

          bt = int(os.environ['BATCH_TOTAL'])
          bi = int(os.environ['BATCH_INDEX'])
          chunk = (len(syms) + bt - 1) // bt
          start = bi * chunk
          end = start + chunk if bi < bt - 1 else len(syms)
          batch_syms = syms[start:end]
          for s in batch_syms:
              print(s)
          " 2>&1)
          BATCH_COUNT=$(echo "$SYMS" | grep -c . 2>/dev/null || echo 0)
          echo "This batch: ${BATCH_COUNT} symbol(s)"
          echo "::endgroup::"

          if [ "$BATCH_COUNT" -eq 0 ]; then
            echo "No symbols to pull — skipping"
            exit 0
          fi

          # Pull in chunks of 15 to avoid slow/noisy failures at scale
          CHUNK=15
          TOTAL=$BATCH_COUNT
          OK=0
          FAIL=0
          echo "::group::Pulling LFS (${TOTAL} symbols, ${CHUNK}/chunk)"
          echo "$SYMS" | while IFS= read -r sym; do
            [ -z "$sym" ] && continue
            echo -n "  [${CHUNK_INDEX:-?}/${TOTAL}] $sym ... "
            if git lfs pull --include="${sym}/**" 2>&1 | tail -1; then
              echo "  ✅ $sym"
              # track progress (write to temp file since subshell)
              echo "ok" >> /tmp/lfs_pull_ok.txt
            else
              rc=$?
              echo "  ⚠️  $sym (exit $rc)"
              echo "fail" >> /tmp/lfs_pull_fail.txt
            fi
          done
          OK=$(wc -l < /tmp/lfs_pull_ok.txt 2>/dev/null || echo 0)
          FAIL=$(wc -l < /tmp/lfs_pull_fail.txt 2>/dev/null || echo 0)
          echo "::endgroup::"
          echo "LFS pull: ${OK}/${TOTAL} ok, ${FAIL} failed"
          if [ "$FAIL" -gt 0 ]; then
            echo "⚠️  ${FAIL} symbol(s) failed — updater will fetch fresh data for them"
          fi

      # ------------------------------------------------------------------
      # Run the spot updater with periodic auto-push (checkpoints)
      # ------------------------------------------------------------------
      - name: Run the dataset update script with retries
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          DATASET_SLUG: linxy/CryptoCoin
          DATA_DIR: data
          MAX_RUNTIME_MIN: ${{ inputs.max_runtime_min || '100' }}
          FETCH_WORKERS: ${{ inputs.fetch_workers || '16' }}
          PUSH_INTERVAL_SEC: ${{ inputs.push_interval_sec || '60' }}
          BATCH_TOTAL: ${{ inputs.batch_total || '1' }}
          BATCH_INDEX: ${{ inputs.batch_index || '0' }}
          PYTHONUNBUFFERED: "1"
          PROXY: ""
        run: |
          max_retries=5
          retry=0
          until bash scripts/run_cryptocoin_update.sh; do
            retry=$((retry + 1))
            if [ "$retry" -ge "$max_retries" ]; then
              echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] updater failed $retry times, giving up."
              exit 1
            fi
            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Update failed (attempt $retry/$max_retries), retrying in 30s..."
            sleep 30
          done

      # ------------------------------------------------------------------
      # Generate run summary
      # ------------------------------------------------------------------
      - name: Generate run summary
        if: always()
        env:
          PYTHONIOENCODING: utf-8:replace
        run: |
          if [ -f output/run_summary_cryptocoin.json ]; then
            poetry run python -c "
          import json
          with open('output/run_summary_cryptocoin.json') as f:
              s = json.load(f)
          with open('output/summary.md','w') as out:
           print(f'# CryptoCoin — Run Summary', file=out)
           print(f'| Item | Value |', file=out)
           print(f'|------|-------|', file=out)
           print(f'| Batch | {s.get(\"batch_index\",0)} / {s.get(\"batch_total\",1)} |', file=out)
           print(f'| Start | {s.get(\"start_time\",\"?\")} |', file=out)
           print(f'| End | {s.get(\"end_time\",\"?\")} |', file=out)
           print(f'| Elapsed | {s.get(\"elapsed_seconds\",\"?\")}s ({s.get(\"budget_limit_min\",\"?\")}min budget) |', file=out)
           print(f'| Series produced | {s.get(\"produced\",0)} |', file=out)
           print(f'| Series failed | {s.get(\"failed\",0)} |', file=out)
           print(f'| Symbols updated | {s.get(\"symbols_updated\",0)} |', file=out)
           print(f'| Remaining (next run) | {s.get(\"remaining\",0)} |', file=out)
           print('', file=out)
           if s.get('per_symbol'):
               print('### Updated symbols', file=out)
               print('| Symbol | Updated | Failed |', file=out)
               print('|--------|---------|--------|', file=out)
               for sym, info in sorted(s['per_symbol'].items()):
                   print(f'| {sym} | {info.get(\"updated\",0)} | {info.get(\"failed\",0)} |', file=out)
          " 2>&1
            cat output/summary.md >> $GITHUB_STEP_SUMMARY
          else
            echo "No run_summary.json found — updater may not have run." >> $GITHUB_STEP_SUMMARY
          fi

      # ------------------------------------------------------------------
      # Squash history — only the master batch squashes
      # ------------------------------------------------------------------
      - name: Squash dataset repository history to a single commit
        if: always() && steps.dataset-repo.outcome == 'success'
        working-directory: data
        env:
          BATCH_INDEX: ${{ inputs.batch_index || '0' }}
          BATCH_TOTAL: ${{ inputs.batch_total || '1' }}
        run: |
          set -e

          if [ "${BATCH_INDEX:-0}" != "0" ] && [ "${BATCH_TOTAL:-1}" != "1" ]; then
            echo "Batch $BATCH_INDEX/$BATCH_TOTAL — skipping squash (master batch only)"
            exit 0
          fi

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          export GIT_LFS_SKIP_SMUDGE=1
          git fetch origin main --quiet
          git reset --hard "origin/main"

          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          BEFORE_SHA=$(git rev-parse HEAD)

          ROOT_SHA=$(git rev-list --max-parents=0 HEAD 2>/dev/null || echo "")
          COMMIT_COUNT=$(git rev-list --count "$ROOT_SHA..HEAD" 2>/dev/null || echo "1")
          if [ "${COMMIT_COUNT:-1}" -le 1 ]; then
            echo "Single commit — squash not needed (HEAD=$BEFORE_SHA)"
            exit 0
          fi

          git checkout --orphan squash-tmp
          git add -A
          git commit -m "Squash history — was ${BEFORE_SHA}, $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git branch -D "$BRANCH"
          git branch -m "$BRANCH"
          git push origin "$BRANCH" --force-with-lease="$BRANCH:$BEFORE_SHA"

          git reflog expire --expire=now --all 2>/dev/null || true
          git gc --prune=now --aggressive 2>/dev/null || true
          echo "Post-squash .git size: $(du -sh .git | cut -f1)"

      # ------------------------------------------------------------------
      # Save the cache for the next run
      # ------------------------------------------------------------------
      - name: Save dataset caches
        if: always() && steps.dataset-repo.outcome == 'success'
        uses: ./.github/actions/hf-repo-setup
        with:
          mode: save
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_slug: linxy/CryptoCoin
          data_dir: data
