name: Update Dataset

on:
  # Run every day at midnight (UTC) — adjust the schedule as needed
  schedule:
    - cron: "0 0 * * *"
  # Allows manual triggering via the "Actions" tab
  workflow_dispatch:

jobs:
  update-dataset:
    runs-on: ubuntu-latest
    # GitHub Actions defaults to a 360-minute (6h) job timeout, after which the
    # job is silently cancelled. Set an explicit timeout so that a stuck run
    # (e.g. Binance API unreachable) fails clearly and quickly
    # instead of running for hours with no useful signal.
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10" # Or your required version

      - name: Install Poetry
        run: pip install poetry

      - name: Update Poetry lock file
        run: poetry lock

      - name: Install project dependencies
        run: poetry install

      - name: Clone the dataset repository
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git clone https://hf_user:${HF_TOKEN}@huggingface.co/datasets/linxy/CryptoCoin data

      - name: Run the dataset update script with retries
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          # Ensure Python logs are flushed immediately instead of being
          # buffered, so timestamps in the Actions log reflect reality.
          PYTHONUNBUFFERED: "1"
        run: |
          max_retries=5
          retry=0
          until poetry run python updater.py; do
            retry=$((retry + 1))
            if [ "$retry" -ge "$max_retries" ]; then
              echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] updater.py failed $retry times, giving up."
              exit 1
            fi
            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Dataset update failed (attempt $retry/$max_retries), retrying in 30 seconds..."
            sleep 30
          done

      - name: Squash dataset repository history to a single commit
        working-directory: data
        run: |
          set -e
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Make sure we have the latest commit that was just pushed by the update script
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          git fetch origin "$BRANCH"
          git reset --hard "origin/$BRANCH"
          BEFORE_SHA=$(git rev-parse HEAD)

          # Recreate the branch with a single commit containing the current state
          git checkout --orphan squash-tmp
          git add -A
          git commit -m "Squash history to reduce repository size (was ${BEFORE_SHA}, $(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git branch -D "$BRANCH"
          git branch -m "$BRANCH"

          # Force-push the squashed history, discarding all previous commits.
          # --force-with-lease guards against overwriting commits pushed by
          # another process after our fetch above.
          git push origin "$BRANCH" --force-with-lease="$BRANCH:$BEFORE_SHA"