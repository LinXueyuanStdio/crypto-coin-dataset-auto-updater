name: Update Dataset

on:
  # Run every day at midnight (UTC) — adjust the schedule as needed
  schedule:
    - cron: "0 0 * * *"
  # Allows manual triggering via the "Actions" tab
  workflow_dispatch:

jobs:
  update-dataset:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10" # Or your required version

      - name: Install Poetry
        run: pip install poetry

      - name: Update Poetry lock file
        run: poetry lock

      - name: Install project dependencies
        run: poetry install

      - name: Clone the dataset repository
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git clone https://hf_user:${HF_TOKEN}@huggingface.co/datasets/linxy/CryptoCoin data

      - name: Setup Proxy
        run: |
          echo "Setting up proxy configuration..."
          sudo apt-get update
          sudo apt-get install -y tor privoxy
          sudo bash -c 'cat >> /etc/privoxy/config << EOL
          forward-socks5 / 127.0.0.1:9050 .
          max-client-connections 256
          keep-alive-timeout 5
          socket-timeout 300
          EOL'
          sudo service tor start
          sudo service privoxy start
          curl --proxy http://127.0.0.1:8118 https://api.ipify.org || true
          sleep 15  # Allow services to stabilize

      - name: Run the dataset update script with retries
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          HTTP_PROXY: "http://127.0.0.1:8118"
          HTTPS_PROXY: "http://127.0.0.1:8118"
        run: |
          until poetry run python updater.py; do
            echo "Dataset update failed, retrying in 30 seconds..."
            sleep 30
          done

      - name: Squash dataset repository history to a single commit
        working-directory: data
        run: |
          set -e
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Make sure we have the latest commit that was just pushed by the update script
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          git fetch origin "$BRANCH"
          git reset --hard "origin/$BRANCH"
          BEFORE_SHA=$(git rev-parse HEAD)

          # Recreate the branch with a single commit containing the current state
          git checkout --orphan squash-tmp
          git add -A
          git commit -m "Squash history to reduce repository size (was ${BEFORE_SHA}, $(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git branch -D "$BRANCH"
          git branch -m "$BRANCH"

          # Force-push the squashed history, discarding all previous commits.
          # --force-with-lease guards against overwriting commits pushed by
          # another process after our fetch above.
          git push origin "$BRANCH" --force-with-lease="$BRANCH:$BEFORE_SHA"